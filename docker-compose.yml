services:
  mysql:
    image: mysql:8.4
    container_name: gestao-clinica-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-gestao_clinica}
      MYSQL_USER: ${MYSQL_USER:-gestao_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-gestao_app_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestao-clinica-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: ${BACKEND_PORT:-3000}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-gestao_clinica}
      DB_USER: ${MYSQL_USER:-gestao_app}
      DB_PASSWORD: ${MYSQL_PASSWORD:-gestao_app_password}
      FRONTEND_ORIGIN: http://localhost:${FRONTEND_PORT:-5173}
      SESSION_SECRET: ${SESSION_SECRET:-development-only-secret}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-replace-with-32-byte-base64-key}
      APP_HASH_KEY: ${APP_HASH_KEY:-replace-with-hmac-secret}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-8}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./backend:/app
      - ./database:/database:ro
      - backend_node_modules:/app/node_modules
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gestao-clinica-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT:-3000}/api
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_node_modules:
  frontend_node_modules:
